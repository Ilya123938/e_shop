{% load i18n %}
<!DOCTYPE html>
<html lang="{{ LANGUAGE_CODE }}" dir="{% if LANGUAGE_BIDI %}rtl{% else %}ltr{% endif %}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Shop - متجر إلكتروني</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ STATIC_URL }}css/style.css">
    
    <style>
        * { font-family: 'Tajawal', sans-serif; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #2d2b65; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #1a1952; }
        
        .text-primary { color: #2d2b65; }
        .bg-primary { background-color: #2d2b65; }
        .hover\:bg-primary-dark:hover { background-color: #1a1952; }
        .card-hover { transition: all 0.3s ease; }
        .card-hover:hover { transform: translateY(-4px); box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .btn-primary { background-color: #fbbf24; border: none; color: #2d2b65; font-weight: 600; }
        .btn-primary:hover { background-color: #f59e0b; }
        .fade-in { animation: fadeIn 0.5s ease-in; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body class="bg-gray-50">
    {% include "parts/navbar.html" %}
    
    <!-- Messages/Alerts -->
    {% include "parts/alert.html" %}
    
    <!-- Main Content -->
    <main class="min-h-screen">
        {% block content %}{% endblock %}
    </main>
    
    <!-- Footer -->
    {% include "parts/footer.html" %}
    
    
    <!-- Custom JavaScript -->
    <script src="{{ STATIC_URL }}js/custom.js"></script>
    
    <script>
        // Fade in animation
        document.addEventListener('DOMContentLoaded', () => {
            document.body.classList.add('fade-in');
        });
        
        // Cart badge update
        function updateCartBadge() {
            const items = localStorage.getItem('cart_count') || '0';
            document.getElementById('cart-badge').textContent = items;
        }
        updateCartBadge();
    </script>
</body>
</html>
