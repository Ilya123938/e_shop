{% extends "accounts/base.html" %}
{% load crispy_forms_tags %}
{% load i18n %}

{% block content %}

<div class="container py-5">

  <!-- Title -->
  <div class="text-center mb-4">
    <h2 class="fw-bold text-primary">{% trans "Create Your Account" %}</h2>
    <p class="text-muted">{% trans "Welcome to our store 👋" %}</p>
    <hr class="w-25 mx-auto">
  </div>

  <!-- Form Card -->
  <div class="row justify-content-center">

    <div class="col-12 col-md-8 col-lg-6">

      <div class="card shadow-sm border-0 rounded-4">

        <div class="card-body p-4">

          <form method="post">
            {% csrf_token %}
            {{ form|crispy }}

            <div class="d-grid mt-3">
              <button type="submit" class="btn btn-primary rounded-pill py-2">
                {% trans "Register" %}
              </button>
            </div>

          </form>

          <hr>

          <div class="text-center">
            <span class="text-muted">{% trans "Already have an account?" %}</span>
            <a href="{% url 'accounts:login' %}" class="text-decoration-none fw-semibold ms-1">
              {% trans "Login here" %}
            </a>
          </div>

        </div>
      </div>

    </div>
  </div>

</div>

{% endblock content %}
