{% extends "accounts/base.html" %}
{% load crispy_forms_tags %}
{% load i18n %}

{% block content %}

<div class="container mx-auto py-10 px-4">

  <!-- Title -->
  <div class="text-center mb-8">
    <h2 class="text-3xl font-bold text-primary">{% trans "Create Your Account" %}</h2>
    <p class="text-gray-600">{% trans "Welcome to our store 👋" %}</p>
    <hr class="w-24 mx-auto mt-4">
  </div>

  <!-- Form Card -->
  <div class="flex justify-center">
    <div class="w-full max-w-md">
      <div class="bg-white shadow-lg rounded-lg">
        <div class="p-8">
          <form method="post">
            {% csrf_token %}
            {{ form|crispy }}
            <div class="mt-4">
              <button type="submit" class="btn-primary-custom w-full py-2">
                {% trans "Register" %}
              </button>
            </div>
          </form>
          <hr class="my-6">
          <div class="text-center">
            <span class="text-gray-600">{% trans "Already have an account?" %}</span>
            <a href="{% url 'accounts:login' %}" class="text-accent font-semibold ml-1">
              {% trans "Login here" %}
            </a>
          </div>
        </div>
      </div>
    </div>
  </div>

</div>

{% endblock content %}
