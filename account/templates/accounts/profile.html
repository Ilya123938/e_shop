{% extends "accounts/base.html" %}
{% load crispy_forms_tags %}

{% block content %}
<div class="container mx-auto mt-10 px-4 max-w-lg">
    <h2 class="text-center text-2xl font-semibold mb-6">{% trans "Edit Your Account" %}</h2>

    {% if messages %}
      {% for message in messages %}
        <div class="bg-green-100 border border-green-300 text-green-700 p-4 rounded mb-4">{{ message }}</div>
      {% endfor %}
    {% endif %}

    <form method="post">
        {% csrf_token %}
        {{ form|crispy }}
        <div class="text-center mt-4">
            <button type="submit" class="btn-primary-custom py-2 px-6">
              {% trans "Update Account" %}
            </button>
        </div>
    </form>
</div>
<div class="text-center mt-6">
    <a href="{% url 'accounts:password_change' %}" class="btn-accent-custom py-2 px-6">
        {% trans "Change Password" %}
    </a>
</div>

{% endblock %}
