{% if messages %}
<div class="fixed top-4 right-4 z-50 space-y-2 max-w-sm" id="messages-container">
    {% for message in messages %}
    <div id="message-{{ forloop.counter }}" class="alert-box rounded-lg p-4 shadow-lg flex items-center gap-3 animate-fade-in
        {% if message.tags == "success" %}bg-green-500 text-white
        {% elif message.tags == "error" %}bg-red-500 text-white
        {% elif message.tags == "warning" %}bg-yellow-500 text-white
        {% elif message.tags == "info" %}bg-blue-500 text-white
        {% else %}bg-gray-500 text-white{% endif %}">
        
        <!-- Icon -->
        <div class="flex-shrink-0">
            {% if message.tags == "success" %}
                <i class="fas fa-check-circle text-xl"></i>
            {% elif message.tags == "error" %}
                <i class="fas fa-exclamation-circle text-xl"></i>
            {% elif message.tags == "warning" %}
                <i class="fas fa-warning text-xl"></i>
            {% elif message.tags == "info" %}
                <i class="fas fa-info-circle text-xl"></i>
            {% endif %}
        </div>
        
        <!-- Message Content -->
        <div class="flex-1">
            <p class="font-semibold text-sm">{{ message }}</p>
        </div>
        
        <!-- Close Button -->
        <button onclick="closeAlert({{ forloop.counter }})" class="text-white hover:opacity-75 transition">
            <i class="fas fa-times"></i>
        </button>
    </div>
    {% endfor %}
</div>

<style>
    @keyframes slideIn {
        from {
            transform: translateX(400px);
            opacity: 0;
        }
        to {
            transform: translateX(0);
            opacity: 1;
        }
    }
    
    .animate-fade-in {
        animation: slideIn 0.3s ease-out;
    }
</style>

<script>
    function closeAlert(id) {
        const alertBox = document.getElementById('message-' + id);
        if (alertBox) {
            alertBox.style.animation = 'slideOut 0.3s ease-out';
            setTimeout(() => alertBox.remove(), 300);
        }
    }
    
    // Auto-close alerts after 5 seconds
    document.addEventListener('DOMContentLoaded', () => {
        const alerts = document.querySelectorAll('[id^="message-"]');
        alerts.forEach((alert, index) => {
            setTimeout(() => {
                const id = alert.id.split('-')[1];
                closeAlert(id);
            }, 5000);
        });
    });
</script>
{% endif %}
